name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'extension/package-lock.json'

      - name: Install dependencies
        run: |
          cd extension
          npm ci

      - name: Build extension
        run: |
          cd extension
          npm run build:ci

      - name: Create distribution ZIP
        run: |
          # 创建发布目录
          mkdir -p release/FreeRide

          # 复制扩展文件
          cp extension/manifest.json release/FreeRide/
          cp -r extension/dist release/FreeRide/

          # 复制 CLI 工具
          cp -r cli release/FreeRide/

          # 复制 Native Host
          cp -r native release/FreeRide/

          # 复制文档
          cp README.md release/FreeRide/
          cp LICENSE release/FreeRide/ 2>/dev/null || true

          # 创建安装说明
          cat > release/FreeRide/INSTALL.md << 'INSTALL_EOF'
          # FreeRide 安装指南

          ## 1. 安装 Chrome 扩展

          1. 打开 Chrome 浏览器
          2. 访问 `chrome://extensions/`
          3. 开启右上角的「开发者模式」
          4. 点击「加载已解压的扩展程序」
          5. 选择本目录下的 `FreeRide` 文件夹

          ## 2. 启动 Native Host (可选，用于高级功能)

          ```bash
          cd FreeRide/native
          python3 native_host.py
          ```

          ## 3. 使用 CLI

          ```bash
          # 添加到 PATH (可选)
          sudo ln -s $(pwd)/FreeRide/cli/freeride.py /usr/local/bin/freeride

          # 使用
          freeride ask "你的问题"
          ```

          ## 4. 打开豆包

          在浏览器中打开 https://www.doubao.com/

          完成！现在可以使用 FreeRide 了。
          INSTALL_EOF

          # 打包
          cd release
          zip -r ../FreeRide-${{ github.ref_name }}.zip FreeRide
          cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: FreeRide ${{ github.ref_name }}
          body: |
            ## FreeRide ${{ github.ref_name }}

            ### 安装方法

            1. 下载 `FreeRide-${{ github.ref_name }}.zip`
            2. 解压到任意目录
            3. 打开 Chrome，访问 `chrome://extensions/`
            4. 开启右上角的「开发者模式」
            5. 点击「加载已解压的扩展程序」
            6. 选择解压后的 `FreeRide` 文件夹
            7. 打开 https://www.doubao.com/

            ### 使用方法

            ```bash
            # 检查状态
            python3 FreeRide/cli/freeride.py status

            # 提问
            python3 FreeRide/cli/freeride.py ask "你的问题"

            # 使用思考模式
            python3 FreeRide/cli/freeride.py ask "复杂问题" --mode think --include-thinking
            ```

            ### 更新日志

            请查看 [commits](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) 了解变更详情。
          files: |
            FreeRide-${{ github.ref_name }}.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
